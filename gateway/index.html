<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charging Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; color: #38bdf8; margin-bottom: 10px; }
        .header p { color: #94a3b8; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #334155;
        }
        .card-title {
            font-size: 0.875rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }
        .card-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f8fafc;
        }
        .card-unit {
            font-size: 1rem;
            color: #64748b;
            margin-left: 4px;
        }
        .status-available { color: #22c55e; }
        .status-charging { color: #3b82f6; }
        .status-faulted { color: #ef4444; }
        .status-preparing { color: #f59e0b; }
        .chart-container { grid-column: 1 / -1; height: 300px; }
        .chart { width: 100%; height: 100%; }
        .logs { grid-column: 1 / -1; max-height: 200px; overflow-y: auto; }
        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid #334155;
            font-family: monospace;
            font-size: 0.875rem;
        }
        .log-time { color: #64748b; margin-right: 12px; }
        .refresh-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .refresh-btn:hover { background: #7dd3fc; }
        .error { color: #ef4444; text-align: center; padding: 40px; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
    </style>
</head>
<body>
    <button class="refresh-btn" onclick="fetchData()">Refresh</button>
    <div class="header">
        <h1>EV Charging Monitor</h1>
        <p>Real-time station telemetry</p>
    </div>
    <div class="grid" id="dashboard">
        <div class="loading">Loading...</div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let telemetryHistory = [];
        const MAX_HISTORY = 50;

        function formatTime(isoString) {
            if (!isoString) return '--:--:--';
            const date = new Date(isoString);
            return date.toLocaleTimeString();
        }

        function getStatusClass(status) {
            const map = {
                'Available': 'status-available',
                'Charging': 'status-charging',
                'Faulted': 'status-faulted',
                'Preparing': 'status-preparing',
                'Finishing': 'status-preparing'
            };
            return map[status] || 'status-available';
        }

        function getStatusIcon(status) {
            const map = {
                'Available': '●',
                'Charging': '⚡',
                'Faulted': '⚠',
                'Preparing': '🔌',
                'Finishing': '⏹'
            };
            return map[status] || '●';
        }

        async function fetchData() {
            try {
                const [stationsRes, telemetryRes] = await Promise.all([
                    fetch(`${API_URL}/stations`),
                    fetch(`${API_URL}/telemetry/CS-001`)
                ]);

                const stations = await stationsRes.json();
                const telemetry = await telemetryRes.json();

                console.log('Stations:', stations);
                console.log('Telemetry count:', telemetry.length);
                console.log('Latest telemetry:', telemetry[0]);

                if (telemetry.length > 0) {
                    // Sort by timestamp ascending for history
                    telemetryHistory = [...telemetry].sort((a, b) => 
                        new Date(a.timestamp) - new Date(b.timestamp)
                    ).slice(-MAX_HISTORY);
                }

                renderDashboard(stations, telemetry);
            } catch (err) {
                console.error('Fetch error:', err);
                document.getElementById('dashboard').innerHTML = 
                    `<div class="error">Error: ${err.message}<br>Make sure backend is running on port 3000</div>`;
            }
        }

        function renderDashboard(stations, telemetry) {
            const latest = telemetry[telemetry.length - 1] || {};
            const station = stations[0] || {};

            console.log('Latest reading:', latest);
            console.log('Status:', latest.status);
            console.log('Power:', latest.power_kw);
            console.log('Current:', latest.current_l1);
            console.log('Voltage:', latest.voltage_l1);

            const status = latest.status || station.status || 'Unknown';
            const statusClass = getStatusClass(status);
            const statusIcon = getStatusIcon(status);

            const html = `
                <div class="card">
                    <div class="card-title">Station Status</div>
                    <div class="card-value ${statusClass}">
                        ${statusIcon} ${status}
                    </div>
                    <div style="margin-top: 8px; color: #64748b; font-size: 0.875rem;">
                        ${station.station_id || 'CS-001'}
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Power</div>
                    <div class="card-value">
                        ${(latest.power_kw || 0).toFixed(2)}
                        <span class="card-unit">kW</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Current</div>
                    <div class="card-value">
                        ${(latest.current_l1 || 0).toFixed(1)}
                        <span class="card-unit">A</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Voltage</div>
                    <div class="card-value">
                        ${(latest.voltage_l1 || 0).toFixed(1)}
                        <span class="card-unit">V</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Temperature</div>
                    <div class="card-value" style="${(latest.temperature || 0) > 70 ? 'color: #ef4444' : ''}">
                        ${(latest.temperature || 0).toFixed(1)}
                        <span class="card-unit">°C</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Energy</div>
                    <div class="card-value">
                        ${(latest.energy_kwh || 0).toFixed(3)}
                        <span class="card-unit">kWh</span>
                    </div>
                </div>

                <div class="card chart-container">
                    <div class="card-title">Power History (kW)</div>
                    <canvas id="powerChart" class="chart"></canvas>
                </div>

                <div class="card logs">
                    <div class="card-title">Recent Telemetry (${telemetry.length} records)</div>
                    ${telemetry.slice(-10).reverse().map(t => `
                        <div class="log-entry">
                            <span class="log-time">${formatTime(t.timestamp)}</span>
                            ${t.status || '?'} | 
                            P:${(t.power_kw || 0).toFixed(2)}kW | 
                            I:${(t.current_l1 || 0).toFixed(1)}A | 
                            V:${(t.voltage_l1 || 0).toFixed(1)}V | 
                            T:${(t.temperature || 0).toFixed(1)}°C
                            ${t.fault ? `<span style="color: #ef4444"> | FAULT: ${t.fault_type}</span>` : ''}
                        </div>
                    `).join('') || '<div class="log-entry">No telemetry data</div>'}
                </div>
            `;

            document.getElementById('dashboard').innerHTML = html;
            drawChart();
        }

        function drawChart() {
            const canvas = document.getElementById('powerChart');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            canvas.width = width;
            canvas.height = height;

            const data = telemetryHistory.map(t => t.power_kw || 0);
            if (data.length < 2) {
                ctx.fillStyle = '#64748b';
                ctx.font = '14px sans-serif';
                ctx.fillText('No data yet...', width/2 - 40, height/2);
                return;
            }

            const max = Math.max(...data, 10);
            const min = Math.min(...data, 0);
            const range = max - min || 1;

            ctx.clearRect(0, 0, width, height);

            // Grid lines
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = height - (height * i / 4);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }

            // Line
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 2;
            ctx.beginPath();

            data.forEach((value, i) => {
                const x = (i / (data.length - 1)) * width;
                const y = height - ((value - min) / range) * height * 0.8 - height * 0.1;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });

            ctx.stroke();

            // Fill
            ctx.fillStyle = 'rgba(56, 189, 248, 0.1)';
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();
            ctx.fill();
        }

        // Auto-refresh every 2 seconds
        fetchData();
        setInterval(fetchData, 2000);
    </script>
</body>
</html>
